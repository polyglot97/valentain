<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>질문</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body { text-align:center; margin-top:120px; font-family:Arial; }
        button { padding:12px 24px; font-size:18px; position:absolute; }
        #yes { left:45%; top:300px; }
        #no { left:55%; top:300px; }
        #curseBubble {
            position:absolute;
            top:20%;
            left:50%;
            transform:translateX(-50%);
            background:white;
            padding:14px 20px;
            border-radius:20px;
            box-shadow:0 5px 15px rgba(0,0,0,0.15);
            font-size:16px;
            display:none;
            z-index:10;
        }
    </style>
</head>
<body>
<h1>나 좋아해? 💘</h1>
<div id="curseBubble"></div>
<div>
    <img src="./images/치이카와.jpg">
</div>

<button id="yes">YES</button>
<button id="no">NO</button>

<script>
    // YES 클릭 시
    $("#yes").click(function () {
        location.href = "result.html";
    });

    // NO 버튼 도망가기
    $("#no").mouseover(function () {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 50);
        $(this).css({ left: x + "px", top: y + "px" });
    });

    const curses = [
        "오늘 커피 마시면 살짝 식어있음 ☕",
        "오늘 커피 마셔도 피곤함 😪",
        "버스 탈 때 자리 없음 😌",
        "유튜브 광고 2개 연속 나옴",
        "양말 한 짝 안 맞음",
        "오늘 나 생각 계속 남",
        "자꾸 내 톡 먼저 보게 됨",
        "괜히 나한테 연락하고 싶어짐",
        "내 사진 다시 보게 됨",
        "결국 YES 다시 누르게 됨"
    ];

    // NO 클릭 시
    $("#no").click(function () {
        const idx = Math.floor(Math.random() * curses.length);
        $("#curseBubble").text("저주 발동! " + curses[idx]).fadeIn();
        setTimeout(() => $("#curseBubble").fadeOut(), 1200);
    });
</script>

</body>
</html>
