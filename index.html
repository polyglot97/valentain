<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💘 오늘의 내 마음</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="main.css">
</head>
<body>

<h1>💘 오늘의 내 마음</h1>
<button id="btn">눌러봐</button>
<button onclick="location.href='love.html'">
    다음 질문 💌
</button>
<div class="result" id="result"></div>

<script>
    // 애인용 멘트 목록
    const messages = [
        "널 만나서 다행이야",
        "생각보다 더 많이 좋아해",
        "보고싶어",
        "아프지마",
        "너랑 있으면 행복해",
        "목소리 듣고 싶어",
        "너랑 함께하는 미래가 너무 기대돼",
        "넌 충분히 잘하고 있어",
        "난 항상 네 편이야",
        "너랑 함께하는 날들은 전부 특별해",
        "넌 뭐든지 잘할 수 있어, 난 항상 믿어",
        "언제든 힘들면 나한테 와서 안겨",
        "일단 도전해보자",
        "잘 될거야"
    ];

    $("#btn").click(function () {
        const idx = Math.floor(Math.random() * messages.length);
        $("#result").text(messages[idx] + " ❤️");

        // 모바일 진동 피드백 (지원되는 브라우저/웹뷰 전용)
        if (window.navigator.vibrate) {
            window.navigator.vibrate(50);
        }
    });
</script>

</body>
</html>
